<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>MapTurk</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: white;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    img {
      max-width: 90%;
      margin-top: 20px;
      transition: 0.3s;
    }

    img:hover {
      transform: scale(1.02);
    }
  </style>
</head>

<body>

<header>
  <h2>MapTurk</h2>
  <nav>
    <a href="#">Start</a>
    <a href="#">Firmalar</a>
    <a href="#">İletişim</a>
  </nav>
</header>

</body>
</html>
